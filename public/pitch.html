const SIX=`<div class="six">
<a class="m" href="kiosk.html" target="_blank"><span class="r">/kiosk</span><h3>Facility terminal</h3>
<div class="who">For people in custody, and those just released</div>
<div class="lb">The problem</div><p class="pr">A person inside cannot look up their own case, and a person released this morning has no phone, no ID, and no idea which programmes they are entitled to join.</p>
<div class="lb">What they can do</div><ul><li>Read their case status, hearing and credit</li><li>Find programmes nearby and enrol on the spot</li><li>In nine languages, without typing a word</li></ul>
<div class="go">Open the terminal →</div></a>

<a class="m" href="app.html" target="_blank"><span class="r">/app</span><h3>Family app</h3>
<div class="who">For families and guardians</div>
<div class="lb">The problem</div><p class="pr">Between visits there is silence. A relative travels for hours to hear four words, and learns nothing about hearings or programmes until the next trip.</p>
<div class="lb">What they can do</div><ul><li>See how their person is — and when it was last confirmed</li><li>Follow hearings, sessions and attendance</li><li>Receive it by SMS, on a phone with no data</li></ul>
<div class="go">Open the app →</div></a>

<a class="m" href="cases.html" target="_blank"><span class="r">/cases</span><h3>Counsel's caseload</h3>
<div class="who">For Public Attorney's Office lawyers</div>
<div class="lb">The problem</div><p class="pr">A PAO lawyer may carry hundreds of clients. The cases that go wrong are the hearing held and never written down, and the client who became eligible while nobody was looking.</p>
<div class="lb">What they can do</div><ul><li>Open to what needs attention today, not an alphabet</li><li>See history, hearings and programme progress in one place</li><li>Record an outcome and notify the family in one action</li></ul>
<div class="go">Open the caseload →</div></a>

<a class="m" href="sessions.html" target="_blank"><span class="r">/sessions</span><h3>Programme attendance</h3>
<div class="who">For social workers and programme providers</div>
<div class="lb">The problem</div><p class="pr">Diversion attendance lives on paper. A child who quietly stops coming — or who attends perfectly but was given too few sessions to finish in time — is only found at a review months later.</p>
<div class="lb">What they can do</div><ul><li>Log a full session in seconds, even with no signal</li><li>See who needs follow-up, and who cannot finish on schedule</li><li>Issue a record anyone can independently verify</li></ul>
<div class="go">Open the register →</div></a>

<a class="m hero" href="verify.html" target="_blank"><span class="r">/verify</span><h3>Kalayaan · Sino siya?</h3>
<div class="who">For LSWDO, PAO and BJMP / BuCor records officers</div>
<div class="lb">The problem</div><p class="pr">The justice system holds people it cannot name. A child booked as an adult loses the diversion the law guarantees. An adult under an alias loses everything downstream of a matched record.</p>
<div class="lb">What they can do</div><ul><li>Interview conversationally — <span class="fil">"hindi ko alam"</span> is always valid</li><li>Reconcile what they remember against civil registration</li><li>Refer the unregistered to a path to existing in the record</li></ul>
<div class="go">Open Kalayaan →</div></a>

<a class="m" href="custody.html" target="_blank"><span class="r">/custody</span><h3>Welfare check-in</h3>
<div class="who">For jail and prison officers</div>
<div class="lb">The problem</div><p class="pr">Officers already see every person every day. That knowledge simply has nowhere to go — so the family outside stays in the dark, and the officer takes the phone calls.</p>
<div class="lb">What they can do</div><ul><li>Confirm welfare in about two seconds, one at a time</li><li>See exactly what the family will read before confirming</li><li>Let a status expire, so nobody is told stale news</li></ul>
<div class="go">Open the check-in →</div></a>
</div>`;

/*1*/{t:42,n:`<p><span class="t">0:00–0:42 · Walk on. No greeting, no team name. Let the room settle.</span></p>
<p>Three-second pause after <b>"punong-puno ka ng pag-asa."</b> Do not fill it. Then flat: "And then nothing."</p>
<p>Protect yourself: <b>the social workers DO remember every name</b> — so nobody from a Bahay Pag-asa can contradict you.</p>
<p>Land hard on <span class="t">"hope is not a plan."</span></p>`,
h:`<div class="s"><div class="k">Isipin mo</div>
<div class="big">Imagine you are sixteen, walking out of <b>Bahay Pag-asa</b>. House of Hope.</div>
<p class="p beat">You did everything they asked. Twelve sessions. You came to all of them.<br>
And at that gate — <b class="fil">punong-puno ka ng pag-asa.</b></p>
<p class="p beat" style="font-size:29px;color:var(--text)"><b>And then nothing.</b></p>
<p class="p beat">Nobody checks. Nobody calls. No next session, no next person.<br>
Same street, same house, same everything — alone, with hope. <b>And hope is not a plan.</b></p>
<div class="foot">Not because anyone stopped caring. The social workers there can tell you every name.</div></div>`},

/*2*/{t:36,n:`<p><span class="t">0:42–1:18 · What the field visit found. This is OUR primary research — say so.</span></p>
<p>"We asked the social workers what happens to the children after they finish. They did not hesitate."</p>
<p><span class="t">"Babalik sila."</span> — let it sit unglossed for a beat.</p>
<p>Then the honest turn: <b>and when we went looking for the national number, there wasn't one.</b> Nobody can tell you how many come back. That absence IS the finding.</p>`,
h:`<div class="s tint"><div class="k">What we found</div>
<h2>We asked what happens to the children after they finish.</h2>
<p class="p beat" style="font-size:34px;color:var(--text);margin-top:16px"><b class="fil">"Babalik sila."</b></p>
<p class="p" style="margin-top:6px">They come back. The social workers did not hesitate, and they were not surprised — they have watched it happen for years, without the means to stop it.</p>
<div class="row beat" style="margin-top:24px;gap:14px">
<div class="card" style="flex:1"><div class="n">Then we looked for the number</div>
<p>How many children return? How many released adults do? <b>There is no national figure.</b> The country's recidivism rate sits in a freedom-of-information request filed February 2025 that has never been answered.</p></div>
<div class="card t" style="flex:1"><div class="n">And that is the finding</div>
<p>A rate needs four things: a release cohort, a person-level identifier, a follow-up window, a chosen event. <b>We have none of the four.</b> Nobody is counting — which is exactly why nobody is following.</p></div></div>
<div class="foot">Primary research: our own team's interview with social workers at a Bahay Pag-asa, July 2026.</div></div>`},

/*3*/{t:30,n:`<p><span class="t">1:18–1:48 · The reframe. Say it plainly, then the turn.</span></p>
<p>"Every system we have moves a <b>case</b> to a verdict. None of them follows a <b>person</b>."</p>
<p>Then: <span class="t">"Entry into that system is automatic. Exit is somebody remembering."</span></p>
<p>Close on the society line — it implicates <b>us</b>, never the room.</p>`,
h:`<div class="s"><div class="k">The real problem</div>
<h2>Every system moves a <i>case</i> to a verdict.<br>None of them follows a <i>person</i>.</h2>
<p class="p beat" style="font-size:26px;color:var(--text);margin-top:22px"><b>Entry into the system is automatic.<br>Exit is somebody remembering.</b></p>
<p class="p beat">Farmers have a federation. Seniors have a card. OFWs have a department.<br>
These people have nobody — because most of us have quietly agreed they don't deserve one.</p>
<p class="p beat" style="font-size:23px;color:var(--text)"><b>That is not a failure of government. That is a description of us.</b></p></div>`},

/*4*/{t:22,n:`<p><span class="t">1:48–2:10 · THE REVEAL. e-Laya is the bida. Say the name and stop.</span></p>
<p>"So it was nobody's job to notice." Beat. <b>"We built the somebody."</b></p>
<p>Then the definition — and be precise: <span class="t">it is NOT one system. It is a set of solutions.</span></p>`,
h:`<div class="s tint" style="justify-content:center">
<p class="p" style="font-size:21px">So it was nobody's job to notice.</p>
<h1 style="font-size:104px;margin:10px 0 0;color:var(--primary);letter-spacing:-.045em">e-Laya</h1>
<p class="p beat" style="font-size:27px;color:var(--text);max-width:50ch;margin-top:18px">
<b>A set of solutions</b> built to help children in conflict with the law, persons deprived of liberty,
<b>their families</b>, and <b>the agencies that carry them</b> — a real second chance, and the
infrastructure that makes one possible.</p>
<div class="foot" style="margin-top:26px">Team Ala-Eh · <span class="fil">"Walang dapat mawala sa sistema."</span></div></div>`},

/*5*/{t:40,n:`<p><span class="t">2:10–2:50 · HOW it works. Not one system — six solutions, one idea.</span></p>
<p>"Not a platform. A set of solutions, each aimed at one moment where the current system goes dark."</p>
<p>Walk the four moments. Then land: <b>we are not building recognition — we are building its portability.</b></p>`,
h:`<div class="s"><div class="k">How it works</div>
<h2>Not one system. A set of solutions — each aimed at a moment the system goes dark.</h2>
<div class="grid g4 beat" style="margin-top:20px">
<div class="card"><div class="n">At intake</div><h3>Who is this?</h3><p style="margin-top:5px">A child with no papers is booked as an adult and loses diversion. We resolve identity instead of guessing.</p></div>
<div class="card"><div class="n">Inside</div><h3>What is my status?</h3><p style="margin-top:5px">Case, hearing, credit — readable by the person it belongs to, and by their family without travelling.</p></div>
<div class="card"><div class="n">At the gate</div><h3>What happens next?</h3><p style="margin-top:5px">Programmes findable and joinable on the spot, so release is not the end of the support.</p></div>
<div class="card t"><div class="n">After</div><h3>Is anyone watching?</h3><p style="margin-top:5px">Attendance tracked, missed sessions flagged the same day, the child who cannot finish caught early.</p></div></div>
<p class="p beat" style="margin-top:22px;font-size:21px"><b>We are not building recognition. We are building its portability</b> — proof the person carries, so the next worker starts where the last one stopped.</p></div>`},

/*6*/{t:44,n:`<p><span class="t">2:50–3:34 · The six solutions. Do NOT read them — sweep and name who each serves.</span></p>
<p>"Six solutions. Every one of them is running right now, and every card here opens it."</p>
<p>Point at Kalayaan: <span class="t">that is the one to watch in the demo.</span></p>`,
h:`<div class="s"><div class="k">The six solutions</div>
<h2 style="margin-bottom:12px">Every one is running — open any of them</h2>
${SIX}</div>`},

/*7*/{t:36,n:`<p><span class="t">3:34–4:10 · Integration. 30% of the score. Full sentences, not shorthand.</span></p>
<p>"eGov SSO is not our login screen — <b>it is why our output has legal weight.</b>"</p>
<p>Then name the greys yourself. Saying it is what makes everything else believable.</p>`,
h:`<div class="s tint"><div class="k">Integration with eGovPH</div>
<h2>Seven services, doing real work</h2>
<table style="margin-top:16px">
<tr><th style="width:150px">eGovPH service</th><th>What it does here</th><th style="width:70px">State</th></tr>
<tr><td class="k2">eGov SSO</td><td>Establishes who is asking and what their role permits them to see. It is also the lawful basis for handling any of this information at all.</td><td><span class="tag pro">wired</span></td></tr>
<tr><td class="k2">eVerify</td><td>Reads a National ID the person hands over, to confirm identity and — where a child's future depends on it — age.</td><td><span class="tag pro">wired</span></td></tr>
<tr><td class="k2">Face Liveness</td><td>Confirms identity at the terminal for someone who no longer holds any ID.</td><td><span class="tag pro">wired</span></td></tr>
<tr><td class="k2">eMessage</td><td>Delivers every notification by SMS, so a family is reached on a basic phone with no internet.</td><td><span class="tag pro">wired</span></td></tr>
<tr><td class="k2">eGov AI</td><td>Runs the terminal in nine Philippine languages, reads any screen aloud, and reads whatever document does exist.</td><td><span class="tag pro">wired</span></td></tr>
<tr><td class="k2">eReport (PSGC)</td><td>Supplies the official barangay hierarchy, so "a programme near me" means a real, matchable place.</td><td><span class="tag live">live</span></td></tr>
<tr><td class="k2">Compass (DBM)</td><td>Provides published national budget figures, used to ground our cost estimates in real numbers.</td><td><span class="tag live">live</span></td></tr>
</table>
<div class="foot"><b>What we will not claim:</b> no eCourt, BJMP, BuCor, DSWD or PAO interface exists in the sandbox — those are proposed. Every screen you are about to see runs on a source that exists today.</div></div>`},

/*8*/{t:180,n:`<p><span class="t">4:10–7:10 · LIVE DEMO — 3 minutes. Click the cards on this slide.</span></p>
<p><span class="t">HERO · KALAYAAN (90s)</span> — a child with no papers. Show <b>"Hindi ko alam"</b> as a valid answer. Show the profile assembling from fragments. Land: <b>a child who knows nothing still walks out with a route to a legal identity.</b></p>
<p><span class="t">KIOSK (50s)</span> — tap Binisaya, the whole terminal becomes Cebuano. Five taps to enrol. Read the blue line aloud.</p>
<p><span class="t">FAMILY (40s)</span> — one officer tap → <b>"Ayos naman siya."</b> Green does not mean healthy; it means somebody looked at him this morning.</p>
<p>Do NOT demo login.</p>`,
h:`<div class="s"><div class="k">Live demo · three minutes</div>
<h2 style="margin-bottom:12px">Kalayaan first — then the terminal, then the family</h2>
${SIX}</div>`},

/*9*/{t:38,n:`<p><span class="t">7:10–7:48 · What it changes. Lead with the second chance, close with the peso.</span></p>
<p>"A second chance is not a feeling. It is a set of things that have to happen — and every one of them is an information operation."</p>
<p>Then the cost, live from DBM's own API. Then the honesty about recidivism.</p>`,
h:`<div class="s tint"><div class="k">What it changes</div>
<h2>A second chance is not a feeling. It is infrastructure.</h2>
<p class="p beat" style="margin-top:12px">To actually give someone one, four things must happen: <b>somebody must know who they are</b>, <b>somebody must know when they are free to go</b>, <b>somebody must offer the next step</b>, and <b>somebody must notice if they stop coming.</b> Every one of those is an information operation. That is what we built.</p>
<div class="row" style="margin:20px 0 0;gap:0;border-top:1px solid var(--border-strong);border-bottom:1px solid var(--border-strong)">
<div style="flex:1;padding:15px 16px 15px 0"><div class="stat" style="font-size:34px">₱214.62</div>
<div class="sl">one detention-day — BJMP FY2026 MOOE ÷ the population the GAA itself assumes <span class="tag live">live · Compass API</span></div></div>
<div style="flex:1;padding:15px 16px;border-left:1px solid var(--border)"><div class="stat" style="font-size:34px">85,000+</div>
<div class="sl">releases in twelve months through paralegal-assisted processes — the work already happens, by hand.</div></div>
<div style="flex:1.1;padding:15px 0 15px 16px;border-left:1px solid var(--border)"><div class="stat" style="font-size:34px">~18,000</div>
<div class="sl">education-programme completions a year that never link to what happened next.</div></div></div>
<div class="foot"><b>We do not claim to reduce recidivism</b> — nobody can measure it yet. We claim that a person stops disappearing between the agencies that are already trying to help them, and that the country becomes able to answer the question.</div></div>`},

/*10*/{t:32,n:`<p><span class="t">7:48–8:20 · Close. Slow. Say the last two lines and stop.</span></p>
<p>Do not add thank-you filler. Let the name sit.</p>`,
h:`<div class="s" style="justify-content:center">
<div class="big" style="font-size:44px;max-width:30ch">Nobody set out to leave them there.<br>It was only ever <b>nobody's job to notice.</b></div>
<p class="p beat" style="font-size:30px;color:var(--text);margin-top:24px"><b>Now it is somebody's.</b></p>
<p class="p beat" style="font-size:21px;max-width:54ch;margin-top:20px">
Six solutions, for the people we have all agreed to look away from —
so that finishing a programme, serving your time, or simply being sixteen and having no papers
is no longer the same thing as disappearing.</p>
<div class="foot" style="margin-top:26px">
<b style="color:var(--primary);font-size:15px">e-Laya</b> · Team Ala-Eh · DICT eGovHackathon 2026 · <span class="fil">"Walang dapat mawala sa sistema."</span></div></div>`}

function go(n){i=Math.max(0,Math.min(D.length-1,n));sl.forEach((e,x)=>e.classList.toggle('on',x===i));
 cnt.textContent=`${i+1}/${D.length}`;bar.style.width=((i+1)/D.length*100)+'%';
 nb.innerHTML=D[i].n+`<p style="color:#5E7398;font-size:12.5px;margin-top:9px">SLIDE ${i+1} · ${D[i].t}s · ends ${f(cum(i+1))} · TOTAL ${f(cum(D.length))}</p>`;}
function fit(){const p=44,sx=(innerWidth-p)/1280,sy=(innerHeight-(nt.classList.contains('on')?innerHeight*.4:0)-p)/720;
 st.style.transform=`scale(${Math.min(sx,sy,1.55)})`;}
addEventListener('keydown',e=>{const k=e.key.toLowerCase();
 if(['arrowright','pagedown',' '].includes(k)){e.preventDefault();go(i+1)}
 else if(['arrowleft','pageup'].includes(k)){e.preventDefault();go(i-1)}
 else if(k==='home')go(0);else if(k==='end')go(D.length-1);
 else if(k==='n'){nt.classList.toggle('on');fit()}
 else if(k==='f'){document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()}});
document.getElementById('hud').onclick=e=>{const a=e.target.dataset.a;if(!a)return;
 if(a==='n')go(i+1);if(a==='p')go(i-1);
 if(a==='nt'){nt.classList.toggle('on');fit()}
 if(a==='f'){document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()}};
st.onclick=e=>{if(e.target.closest('a'))return;go(e.clientX<innerWidth*.25?i-1:i+1)};
addEventListener('resize',fit);fit();go(0);
</script></body></html>
