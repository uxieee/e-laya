<a class="m" href="kiosk.html" target="_blank"><span class="r">/kiosk</span><h3>Facility terminal</h3>
<div class="who">For people in custody, and people released this morning</div>
<div class="lb">The problem</div><p class="pr">A person inside cannot look up their own case. A person released this morning has no phone, no ID, and no idea which programmes they are entitled to join.</p>
<div class="lb">What they can do</div><ul><li>Read their case status, next hearing and credit</li><li>Find programmes nearby and enrol on the spot</li><li>Nine languages, no typing required</li></ul>
<div class="go">Open the terminal →</div></a>

<a class="m" href="app.html" target="_blank"><span class="r">/app</span><h3>Family app</h3>
<div class="who">For families and guardians</div>
<div class="lb">The problem</div><p class="pr">Between visits there is silence. A relative travels for hours to hear four words, then learns nothing about hearings or programmes until the next trip.</p>
<div class="lb">What they can do</div><ul><li>See how their person is, and when it was last confirmed</li><li>Follow hearings, sessions and attendance</li><li>Get it by SMS, on a phone with no data</li></ul>
<div class="go">Open the app →</div></a>

<a class="m" href="cases.html" target="_blank"><span class="r">/cases</span><h3>Counsel's caseload</h3>
<div class="who">For Public Attorney's Office lawyers</div>
<div class="lb">The problem</div><p class="pr">One PAO lawyer can carry hundreds of clients. What slips is the hearing that happened and was never written down, and the client who became eligible while nobody was looking.</p>
<div class="lb">What they can do</div><ul><li>Open on what needs attention today</li><li>See history, hearings and programme progress in one place</li><li>Record an outcome and tell the family in one action</li></ul>
<div class="go">Open the caseload →</div></a>

<a class="m" href="sessions.html" target="_blank"><span class="r">/sessions</span><h3>Programme attendance</h3>
<div class="who">For social workers and programme providers</div>
<div class="lb">The problem</div><p class="pr">Diversion attendance lives on paper. The child who quietly stops coming, and the child attending perfectly with too few sessions left to finish on time, both surface at a review months later.</p>
<div class="lb">What they can do</div><ul><li>Log a full session in seconds, even with no signal</li><li>See who needs follow-up, and who cannot finish on schedule</li><li>Issue a record anyone can verify independently</li></ul>
<div class="go">Open the register →</div></a>

<a class="m" href="verify.html" target="_blank"><span class="r">/verify</span><h3>Kalayaan · Sino siya?</h3>

<div class="lb">The problem</div><p class="pr">People are held under names nobody has been able to confirm. A child booked as an adult loses the diversion the law guarantees. An adult under an alias loses everything that follows a matched record.</p>
<div class="lb">What they can do</div><ul><li>Interview conversationally, where <span class="fil">"hindi ko alam"</span> is a valid answer</li><li>Reconcile what they remember against civil registration</li><li>Refer the unregistered to a route into the record</li></ul>

<div class="lb">The problem</div><p class="pr">Officers already see every person every day. That knowledge has nowhere to go, so the family outside waits without news, and the officer takes the phone calls.</p>
<div class="lb">What they can do</div><ul><li>Confirm welfare in about two seconds, one person at a time</li><li>See exactly what the family will read before confirming</li><li>Let a status expire, so nobody is told stale news</li></ul>
<div class="go">Open the check-in →</div></a>

/*3*/{t:34,n:`<p><span class="t">0:48 to 1:22 · This is OUR field visit. Say that out loud, it is primary research.</span></p>
<p>"We went to a Bahay Pag-asa. We asked the social workers what happens to the children after they finish. They answered in about a second."</p>

h:`<div class="s tint"><div class="k">What we found</div>
<h2>We asked what happens to the children after they finish.</h2>
<p class="p beat" style="font-size:34px;color:var(--text);margin-top:16px"><b class="fil">"Babalik sila."</b></p>
<p class="p" style="margin-top:6px">They come back. Nobody hesitated, and nobody was surprised. These are people who have watched it happen for years without the means to stop it.</p>
<div class="row beat" style="margin-top:24px;gap:14px">
<div class="card" style="flex:1"><div class="n">Then we looked for the number</div>
<p>How many children come back? How many released adults do? <b>There is no national figure.</b> The country's recidivism rate sits inside a freedom of information request filed in February 2025 that has never been answered.</p></div>
<div class="card t" style="flex:1"><div class="n">And that is the finding</div>
<p>A rate needs four things: a release cohort, a person level identifier, a fixed follow up window, and a chosen event. <b>We have none of the four.</b> Nobody counts them, so nobody follows them.</p></div></div>
<div class="foot">Primary research: our own interview with social workers at a Bahay Pag-asa, July 2026.</div></div>`},

h:`<div class="s"><div class="k">How it works</div>
<h2>Six solutions, one for each moment a person can drop out of sight.</h2>
<div class="grid g4 beat" style="margin-top:20px">
<div class="card"><div class="n">At intake</div><h3>Who is this?</h3><p style="margin-top:5px">A child with no papers gets booked as an adult and loses diversion. We resolve identity instead of guessing at it.</p></div>
<div class="card"><div class="n">Inside</div><h3>What is my status?</h3><p style="margin-top:5px">Case, hearing and credit, readable by the person they belong to, and by the family without the trip.</p></div>

h:`<div class="s tint"><div class="k">Integration with eGovPH</div>
<h2>Seven services, doing real work</h2>
<table style="margin-top:16px">
<tr><th style="width:150px">eGovPH service</th><th>What it does here</th></tr>
<tr><td class="k2">eGov SSO</td><td>Establishes who is asking and what their role permits them to see. It is also the lawful basis for handling any of this information at all.</td></tr>
<tr><td class="k2">eVerify</td><td>Reads the National ID a person hands over, to confirm identity and, where a child's whole future turns on it, age.</td></tr>
<tr><td class="k2">Face Liveness</td><td>Confirms identity at the terminal for someone who no longer holds any ID at all.</td></tr>
<tr><td class="k2">eMessage</td><td>Sends every notification by SMS, so a family on a basic phone with no internet still gets the news.</td></tr>
<tr><td class="k2">eGov AI</td><td>Runs the terminal in nine Philippine languages, reads any screen aloud, and reads whatever document does exist.</td></tr>
<tr><td class="k2">eReport (PSGC)</td><td>Supplies the official barangay hierarchy, so "a programme near me" resolves to a real, matchable place.</td></tr>
<tr><td class="k2">Compass (DBM)</td><td>Pulls published national budget figures, so our cost numbers come from the government's own data.</td></tr>
</table>
<div class="foot"><b>What we will not claim:</b> no eCourt, BJMP, BuCor, DSWD or PAO interface exists in the sandbox, so those integrations are proposed, not built. Every screen you just saw runs on a source that exists today.</div></div>`},

<p>Say the headline to the room, not to the screen. <b>"We"</b> includes everyone here, and it includes us. Never point at an agency.</p>
<p>Two beats in the middle, one per line. Then stop, breathe, and deliver the last line slower than everything before it: <span class="t">"A second chance is not a feeling. It is infrastructure."</span></p>
<p>Hold the silence after the last line. Do not rush into the next slide.</p>`,
h:`<div class="s tint"><div class="k">What it changes</div>
<h2>This is the one sector we have all agreed to look away from.</h2>
<p class="p beat" style="margin-top:12px;max-width:74ch">We judge them, and then we stop looking. A country's systems are built out of what its people are willing to look at.</p>
<p class="p" style="margin-top:10px;max-width:74ch">The law already promises a second chance. Thousands are working to deliver it. What was never built is the thing that carries it past the gate.</p>
<p class="p" style="font-size:26px;color:var(--text);margin-top:16px;max-width:74ch"><b>A second chance is not a feeling. It is infrastructure.</b></p>
</div>`},

<p>Three images, one breath each: the hope he walks out with, the mother who cannot find out how he is, the child who comes back because nothing was waiting.</p>
<p>Then the turn, hard: <span class="t">"It was only ever nobody's job to notice. Now it is somebody's."</span></p>
<p>Read the address out loud, slowly, digit by digit if you have to. Say: <b>"All six are open right now. Open them while we are still standing here."</b></p>
<p>No thank you, no team bow, no "any questions". Say the name and stop.</p>`,
